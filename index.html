<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTT Mobile Ultra-Fast Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --accent-color: #ff0055;
            --text-color: #1d1d1f;
            --text-dim: #6e6e73;
            --border-color: #e5e5ea;
        }

        [data-theme="dark"] {
            --bg-color: #0f0f0f;
            --card-bg: #1f1f1f;
            --accent-color: #ff0055;
            --text-color: #ffffff;
            --text-dim: #aaaaaa;
            --border-color: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .ceo-header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 15px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-color);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .video-container {
            width: 100%;
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .video-container.landscape-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            aspect-ratio: auto;
            z-index: 9999;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .media-title-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 70px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            z-index: 1015;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-container.show-controls .media-title-overlay {
            opacity: 1;
        }

        .landscape-back-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            z-index: 1010;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .video-container.landscape-mode .landscape-back-btn {
            display: flex;
        }
        
        .video-container.show-controls .landscape-back-btn {
            opacity: 1;
        }

        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex;
            flex-direction: column;
            padding: 5px 15px 10px 15px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1005;
        }

        .video-container.show-controls .video-controls {
            opacity: 1;
        }

        .timeline-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .video-progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }

        .video-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            border-radius: 3px;
        }

        .time-display {
            font-size: 12px;
            color: #fff;
            white-space: nowrap;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 30px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
            z-index: 1010;
        }

        .video-container.show-controls .center-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .center-btn {
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 15px;
        }

        .top-bar-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .theme-toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 16px;
        }

        .status-msg i {
            display: block;
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .main-tabs {
            display: flex;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 5px;
            flex: 1;
            margin-right: 10px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: white;
        }

        .category-accordion {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .accordion-item {
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .accordion-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            font-size: 15px;
        }

        .accordion-header .count-badge {
            background: rgba(255, 0, 85, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
        }

        .accordion-header i {
            transition: transform 0.2s;
            color: var(--text-dim);
        }

        .accordion-item.active .accordion-header i {
            transform: rotate(180deg);
            color: var(--accent-color);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.01);
        }

        .accordion-item.active .accordion-content {
            max-height: 400px;
            overflow-y: auto;
            border-top: 1px solid var(--border-color);
        }

        .stream-list {
            display: flex;
            flex-direction: column;
        }

        .stream-list-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .stream-list-item:last-child {
            border-bottom: none;
        }

        .stream-list-item:active {
            background: rgba(255, 0, 85, 0.05);
        }

        .stream-logo {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.05);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .stream-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
            position: absolute;
        }

        .stream-logo i {
            color: var(--text-dim);
            font-size: 16px;
        }

        .stream-details {
            flex: 1;
            min-width: 0;
        }

        .stream-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="ceo-header">
        <i class="fas fa-user-shield"></i> CEO: Əli Məhərrəmov
    </div>

    <div class="video-container" id="videoContainer">
        <div class="media-title-overlay" id="mediaTitleOverlay">Oynatılan Yayın Seçilmedi</div>

        <button class="landscape-back-btn" id="landscapeBackBtn" onclick="event.stopPropagation(); exitLandscape();" title="Geri Dön">
            <i class="fas fa-arrow-left"></i>
        </button>

        <video id="mainPlayer" playsinline></video>
        
        <div class="center-controls">
            <button class="center-btn" onclick="event.stopPropagation(); rewind();"><i class="fas fa-backward"></i></button>
            <button class="center-btn" id="centerPlayBtn" onclick="event.stopPropagation(); togglePlay();"><i class="fas fa-play"></i></button>
            <button class="center-btn" onclick="event.stopPropagation(); forward();"><i class="fas fa-forward"></i></button>
        </div>

        <div class="video-controls" id="videoControls">
            <div class="timeline-container" onclick="event.stopPropagation();">
                <div class="video-progress-bar" id="progressBar" onclick="seekVideo(event)">
                    <div class="video-progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
            </div>

            <div class="control-row" onclick="event.stopPropagation();">
                <div class="control-group">
                    <button class="control-btn" onclick="togglePlay()" id="playBtn"><i class="fas fa-play"></i></button>
                    <button class="control-btn" onclick="rewind()"><i class="fas fa-undo"></i></button>
                    <button class="control-btn" onclick="forward()"><i class="fas fa-redo"></i></button>
                </div>
                <div class="control-group">
                    <button class="control-btn" onclick="toggleRotate()" id="rotateBtn" title="Ekranı Çevir"><i class="fas fa-sync-alt"></i> Çevir</button>
                    <button class="control-btn" onclick="togglePip()" id="pipBtn"><i class="fas fa-compress"></i> PiP</button>
                    <button class="control-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="content-area">
        <div class="top-bar-tools">
            <div class="main-tabs">
                <button class="tab-btn active" id="tabLiveBtn" onclick="switchMainTab('live')">Canlı Kanallar</button>
                <button class="tab-btn" id="tabSeriesBtn" onclick="switchMainTab('series')">Diziler / VOD</button>
            </div>
            <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">
                <i class="fas fa-moon"></i> Gece
            </button>
        </div>

        <div id="statusLayout" class="status-msg">
            <i class="fas fa-spinner fa-spin"></i>
            <span>Oynatma Listesi Yükleniyor...</span>
        </div>

        <div id="mainLayout" style="display: none;">
            <div class="category-accordion" id="accordionContainer"></div>
        </div>
    </div>

    <script>
        const INTERNAL_M3U_URL = "https://raw.githubusercontent.com/zonaa3483-prog/eli-iptv-siyahi/refs/heads/main/alimtv.m3u"; 

        // VLC STANDARTLARINDA HIZLI ENTEGRE PROXY SİSTEMİ
        const PROXY_POOL = [
            "https://api.allorigins.win/raw?url=",
            "https://corsproxy.io/?",
            "https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=",
            "" 
        ];

        const PLAYLIST_DATA = {
            live: {},
            series: {}
        };

        let currentMainTab = 'live';
        let currentTheme = 'light'; 
        let hls = null;
        let controlsTimeout = null;
        let isChangingPip = false; 
        
        const video = document.getElementById('mainPlayer');
        const videoContainer = document.getElementById('videoContainer');
        const videoControls = document.getElementById('videoControls');
        const playBtn = document.getElementById('playBtn');
        const centerPlayBtn = document.getElementById('centerPlayBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const mediaTitleOverlay = document.getElementById('mediaTitleOverlay');

        // --- ULTRA HIZLI OPTİMİZE M3U PARSER ---
        async function fetchAndParseM3U() {
            let text = null;
            // İlk başarılı proxy'den veriyi anında çek
            for (let p = 0; p < PROXY_POOL.length; p++) {
                try {
                    const targetUrl = PROXY_POOL[p] ? PROXY_POOL[p] + encodeURIComponent(INTERNAL_M3U_URL) : INTERNAL_M3U_URL;
                    const response = await fetch(targetUrl);
                    if (response.ok) {
                        text = await response.text();
                        if (text && text.includes("#EXTM3U")) break;
                    }
                } catch (e) {
                    continue;
                }
            }

            if (!text) {
                document.getElementById('statusLayout').innerHTML = `<i class="fas fa-exclamation-triangle"></i><span>Bağlantı kurulamadı.</span>`;
                return;
            }

            // Hızlı döngü ve regex ile veriyi saniyeler içinde grupla
            const lines = text.split('\n');
            let currentItem = null;

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;

                if (line.startsWith('#EXTINF:')) {
                    const groupMatch = line.match(/group-title="([^"]+)"/);
                    const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                    const commaIndex = line.indexOf(',');
                    const title = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : "Kanal";
                    
                    currentItem = {
                        title: title,
                        group: groupMatch ? groupMatch[1] : "Diğerleri",
                        logo: logoMatch ? logoMatch[1] : ""
                    };
                } else if (line.startsWith('http') && currentItem) {
                    let type = 'live';
                    const lowerUrl = line.toLowerCase();
                    const lowerGroup = currentItem.group.toLowerCase();
                    const lowerTitle = currentItem.title.toLowerCase();

                    // VOD / VLC / MP4 / Dizi kontrol filtresi
                    if (lowerUrl.includes('/series/') || lowerUrl.includes('/vod/') || lowerUrl.includes('/movie/') || 
                        lowerUrl.endsWith('.mp4') || lowerUrl.endsWith('.mkv') || lowerUrl.endsWith('.avi') ||
                        lowerGroup.includes('dizi') || lowerGroup.includes('film') || lowerGroup.includes('series') || lowerGroup.includes('vod')) {
                        type = 'series';
                    }

                    if (type === 'live' && lowerTitle.includes('kurtlar vadisi')) {
                        currentItem = null;
                        continue;
                    }

                    if (!PLAYLIST_DATA[type][currentItem.group]) {
                        PLAYLIST_DATA[type][currentItem.group] = [];
                    }

                    PLAYLIST_DATA[type][currentItem.group].push({
                        title: currentItem.title,
                        logo: currentItem.logo,
                        url: line
                    });
                    currentItem = null;
                }
            }
            initUI();
        }

        function initUI() {
            document.getElementById('statusLayout').style.display = 'none';
            document.getElementById('mainLayout').style.display = 'block';
            switchMainTab('live');
        }

        function switchMainTab(tab) {
            currentMainTab = tab;
            document.getElementById('tabLiveBtn').classList.toggle('active', tab === 'live');
            document.getElementById('tabSeriesBtn').classList.toggle('active', tab === 'series');
            renderAccordion();
        }

        function renderAccordion() {
            const container = document.getElementById('accordionContainer');
            container.innerHTML = '';
            const categories = Object.keys(PLAYLIST_DATA[currentMainTab]);

            categories.forEach((catName) => {
                const items = PLAYLIST_DATA[currentMainTab][catName];
                const accordionItem = document.createElement('div');
                accordionItem.className = 'accordion-item';
                
                accordionItem.innerHTML = `
                    <div class="accordion-header" onclick="toggleAccordion(this)">
                        <div>${catName} <span class="count-badge">${items.length}</span></div>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="accordion-content">
                        <div class="stream-list"></div>
                    </div>
                `;

                const listContainer = accordionItem.querySelector('.stream-list');
                items.forEach(item => {
                    const listItem = document.createElement('div');
                    listItem.className = 'stream-list-item';
                    listItem.onclick = () => playMedia(item.url, item.title);
                    
                    const imgHTML = item.logo ? `<img src="${item.logo}" loading="lazy" onerror="this.style.display='none'">` : '';
                    const fallbackIcon = currentMainTab === 'live' ? 'fa-tv' : 'fa-film';
                    
                    listItem.innerHTML = `
                        <div class="stream-logo">${imgHTML}<i class="fas ${fallbackIcon}"></i></div>
                        <div class="stream-details"><div class="stream-name">${item.title}</div></div>
                    `;
                    listContainer.appendChild(listItem);
                });
                container.appendChild(accordionItem);
            });
        }

        function toggleAccordion(header) {
            const item = header.parentElement;
            const isActive = item.classList.contains('active');
            document.querySelectorAll('.accordion-item').forEach(el => {
                el.classList.remove('active');
                el.querySelector('.accordion-content').style.maxHeight = null;
            });
            if (!isActive) {
                item.classList.add('active');
                const content = item.querySelector('.accordion-content');
                content.style.maxHeight = "400px";
            }
        }

        // --- VLC PLAYER KARARLILIĞINDA HIZLI OYNATICI MOTORU ---
        function playMedia(url, title) {
            if (hls) {
                hls.destroy();
                hls = null;
            }

            mediaTitleOverlay.innerText = title || "Oynatılıyor";
            let proxyIdx = 0;

            const isVOD = url.toLowerCase().includes('.mp4') || url.toLowerCase().includes('.mkv') || url.toLowerCase().includes('.avi') || url.toLowerCase().includes('/vod/') || url.toLowerCase().includes('/series/');

            function loadEngine(targetUrl, pIndex) {
                let finalUrl = targetUrl;
                if (pIndex < PROXY_POOL.length && PROXY_POOL[pIndex] !== "" && !isVOD) {
                    finalUrl = PROXY_POOL[pIndex] + encodeURIComponent(targetUrl);
                }

                // VOD veya Ham MP4/MKV ise VLC mantığıyla direkt yerel motorla aç (En hızlısı)
                if (isVOD) {
                    video.src = targetUrl; // VOD için proxy yükü bindirme direkt aç
                    video.load();
                    video.play().catch(() => attemptVODWithProxy(targetUrl));
                    return;
                }

                // Canlı Yayınlar veya M3U8 akışları için optimize HLS katmanı
                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true, // Gecikmesiz hızlı açılış modu aktif
                        backBufferLength: 5,
                        maxBufferLength: 10,
                        maxMaxBufferLength: 20,
                        liveSyncDuration: 1.0, // Canlı yayını yakalama süresi 1 saniyeye çekildi
                        liveMaxLatencyDuration: 3.0,
                        manifestLoadingMaxRetry: 3,
                        fragLoadingMaxRetry: 3,
                        xhrSetup: function (xhr) {
                            xhr.withCredentials = false;
                            if (xhr.setRequestHeader) {
                                xhr.setRequestHeader("X-Requested-With", "XMLHttpRequest");
                            }
                        }
                    });

                    hls.loadSource(finalUrl);
                    hls.attachMedia(video);
                    
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(e => console.log(e)));
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                                hls.destroy();
                                switchNextProxy();
                            } else {
                                hls.recoverMediaError();
                            }
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Apple iOS Safari için yerel hızlı oynatma
                    video.src = finalUrl;
                    video.load();
                    video.play().catch(() => switchNextProxy());
                }
            }

            function attemptVODWithProxy(vodUrl) {
                // Eğer doğrudan VOD açılmazsa yedek olarak proxy ile açmayı dene
                video.src = PROXY_POOL[0] + encodeURIComponent(vodUrl);
                video.load();
                video.play().catch(e => console.log("VOD Açma Hatası", e));
            }

            function switchNextProxy() {
                proxyIdx++;
                if (proxyIdx < PROXY_POOL.length) {
                    loadEngine(url, proxyIdx);
                } else {
                    mediaTitleOverlay.innerText = "Yayın Akışı Başlatılamadı.";
                }
            }

            loadEngine(url, proxyIdx);
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            centerPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
            showControlsTemporarily();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- SÜRE VE KONTROLLER ---
        video.addEventListener('timeupdate', () => {
            if (video.duration && isFinite(video.duration) && video.duration > 0 && currentMainTab !== 'live') {
                timeDisplay.innerText = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
                progressFill.style.width = `${(video.currentTime / video.duration) * 100}%`;
            } else {
                timeDisplay.innerText = "Canlı Yayın";
                progressFill.style.width = '100%';
            }
        });

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
            const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60), s = Math.floor(seconds % 60);
            return h > 0 ? `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}` : `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function seekVideo(event) {
            if (!video.duration || !isFinite(video.duration) || currentMainTab === 'live') return;
            video.currentTime = (event.clientX - progressBar.getBoundingClientRect().left) / progressBar.getBoundingClientRect().width * video.duration;
        }

        function togglePlay() {
            if (video.paused) { video.play().catch(e => console.log(e)); playBtn.innerHTML = '<i class="fas fa-pause"></i>'; centerPlayBtn.innerHTML = '<i class="fas fa-pause"></i>'; }
            else { video.pause(); playBtn.innerHTML = '<i class="fas fa-play"></i>'; centerPlayBtn.innerHTML = '<i class="fas fa-play"></i>'; }
            showControlsTemporarily();
        }

        function forward() { if(currentMainTab !== 'live') video.currentTime += 10; showControlsTemporarily(); }
        function rewind() { if(currentMainTab !== 'live') video.currentTime -= 10; showControlsTemporarily(); }

        videoContainer.addEventListener('click', function(e) {
            if (e.target === video || e.target === videoContainer || e.target === mediaTitleOverlay) {
                if (videoContainer.classList.contains('show-controls')) {
                    videoContainer.classList.remove('show-controls');
                    if (controlsTimeout) clearTimeout(controlsTimeout);
                } else {
                    showControlsTemporarily();
                }
            }
        });

        function showControlsTemporarily() {
            videoContainer.classList.add('show-controls');
            if (controlsTimeout) clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!video.paused && !isChangingPip) videoContainer.classList.remove('show-controls');
            }, 3000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (videoContainer.requestFullscreen) videoContainer.requestFullscreen();
                else if (videoContainer.webkitRequestFullscreen) videoContainer.webkitRequestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function toggleRotate() {
            if (!videoContainer.classList.contains('landscape-mode')) enterLandscape();
            else exitLandscape();
        }

        function enterLandscape() {
            videoContainer.classList.add('landscape-mode');
            document.body.style.overflow = 'hidden';
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(e => console.log(e));
                });
            }
            showControlsTemporarily();
        }

        function exitLandscape() {
            videoContainer.classList.remove('landscape-mode');
            document.body.style.overflow = '';
            if (document.fullscreenElement) document.exitFullscreen();
            if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
            showControlsTemporarily();
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && videoContainer.classList.contains('landscape-mode')) exitLandscape();
        });

        async function togglePip() {
            try {
                isChangingPip = true;
                if (video !== document.pictureInPictureElement) await video.requestPictureInPicture();
                else await document.exitPictureInPicture();
            } catch (error) {
                alert("Cihazınız PiP desteklemiyor.");
            } finally {
                isChangingPip = false;
                if (!video.paused) video.play().catch(e => console.log(e));
            }
        }

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerHTML = '<i class="fas fa-moon"></i> Gece';
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerHTML = '<i class="fas fa-sun"></i> Gündüz';
            }
        }

        window.onload = () => { fetchAndParseM3U(); };
    </script>
</body>
</html>
