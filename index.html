<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ƏLİ TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <style>
        :root { --bg-color: #f5f5f7; --card-bg: #ffffff; --accent-color: #ff0055; --text-color: #1d1d1f; --border-color: #e5e5ea; }
        [data-theme="dark"] { --bg-color: #0f0f0f; --card-bg: #1f1f1f; --accent-color: #ff0055; --text-color: #ffffff; --border-color: #2a2a2a; }
        body { background-color: var(--bg-color); color: var(--text-color); margin: 0; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .video-container { position: relative; background: #000; aspect-ratio: 16 / 9; z-index: 1000; }
        .video-container.fullscreen-active { position: fixed !important; top: 0; left: 0; width: 100vw !important; height: 100vh !important; z-index: 99999; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .video-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.8)); padding: 10px; display: flex; justify-content: space-between; opacity: 0; transition: opacity 0.3s; }
        .video-container:hover .video-controls, .video-container.show-controls .video-controls { opacity: 1; }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; }
        .accordion-item { background: var(--card-bg); border: 1px solid var(--border-color); margin-bottom: 10px; border-radius: 8px; }
        .accordion-header { padding: 15px; cursor: pointer; font-weight: bold; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s; }
        .accordion-item.active .accordion-content { max-height: 400px; overflow-y: auto; }
        .stream-list-item { padding: 12px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
    </style>
</head>
<body>

    <div class="video-container" id="videoContainer">
        <video id="mainPlayer" playsinline></video>
        <div class="video-controls">
            <button onclick="togglePlay()"><i class="fas fa-play"></i></button>
            <button onclick="toggleRotate()"><i class="fas fa-sync-alt"></i></button>
        </div>
    </div>

    <div class="content-area" id="accordionContainer"></div>

    <script>
        const video = document.getElementById('mainPlayer');
        const container = document.getElementById('videoContainer');
        const M3U_URL = "https://raw.githubusercontent.com/zonaa3483-prog/eli-iptv-siyahi/refs/heads/main/alimtv.m3u";

        // 1. M3U OYUN LİSTESİNİ ÇEKME VE LİSTELEME
        async function fetchAndParseM3U() {
            try {
                const response = await fetch(M3U_URL);
                const text = await response.text();
                const lines = text.split('\n');
                let html = '';
                
                lines.forEach(line => {
                    if (line.startsWith('#EXTINF:')) {
                        const title = line.split(',')[1];
                        const url = lines[lines.indexOf(line) + 1];
                        html += `<div class="accordion-item">
                                    <div class="accordion-header" onclick="this.parentElement.classList.toggle('active')">${title}</div>
                                    <div class="accordion-content"><div class="stream-list-item" onclick="playMedia('${url}')">Oynat</div></div>
                                 </div>`;
                    }
                });
                document.getElementById('accordionContainer').innerHTML = html;
            } catch (e) { console.error("M3U yüklenemedi", e); }
        }

        function playMedia(url) {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(url);
                hls.attachMedia(video);
                video.play();
            } else {
                video.src = url;
                video.play();
            }
        }

        // 2. EKRAN SORUNUNU ÇÖZEN DÖNDÜRME MANTIĞI
        function toggleRotate() {
            if (!document.fullscreenElement) {
                container.classList.add('fullscreen-active');
                container.requestFullscreen().catch(err => alert("Tam ekran hatası"));
            } else {
                document.exitFullscreen();
                container.classList.remove('fullscreen-active');
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) container.classList.remove('fullscreen-active');
        });

        function togglePlay() { video.paused ? video.play() : video.pause(); }
        
        window.onload = fetchAndParseM3U;
    </script>
</body>
</html>
