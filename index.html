<!DOCTYPE html>

<html lang=”tr”>

<head>

    <meta charset=”UTF-8”>

    <meta name=”viewport” content=”width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no”>

    <title>ƏLİ TV</title>

    <link rel=”stylesheet” href=https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css>

    <script src=https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js></script>

    <style>

        /* Varsayılan Tema: BEYAZ (Gündüz Modu) */

        :root {

            --bg-color: #f5f5f7;

            --card-bg: #ffffff;

            --accent-color: #ff0055;

            --text-color: #1d1d1f;

            --text-dim: #6e6e73;

            --border-color: #e5e5ea;

        }



        /* Siyah Tema Değişkenleri (Gecə Modu) */

        [data-theme=”dark”] {

            --bg-color: #0f0f0f;

            --card-bg: #1f1f1f;

            --accent-color: #ff0055;

            --text-color: #ffffff;

            --text-dim: #aaaaaa;

            --border-color: #2a2a2a;

        }



	{

            Box-sizing: border-box;

            Margin: 0;

            Padding: 0;

            Font-family: ‘Segoe UI’, Tahoma, Geneva, Verdana, sans-serif;

            -webkit-tap-highlight-color: transparent;

        }



        Body {

            Background-color: var(--bg-color);

            Color: var(--text-color);

            Overflow-x: hidden;

            Display: flex;

            Flex-direction: column;

            Height: 100vh;

            Transition: background-color 0.3s, color 0.3s;

        }



        /* --- ÜST BAR (BAŞLIK & TEMA) --- */

        .top-header-bar {

            Background: var(--card-bg);

            Border-bottom: 1px solid var(--border-color);

            Padding: 10px 15px;

            Display: flex;

            Justify-content: space-between;

            Align-items: center;

        }



        .app-title-container {

            Display: flex;

            Flex-direction: column;

            Gap: 2px;

        }



        .app-title {

            Font-size: 18px;

            Font-weight: 700;

            Color: var(--text-color);

            Letter-spacing: 0.5px;

        }



        .ceo-header-link {

            Font-size: 12px;

            Font-weight: 600;

            Color: var(--accent-color);

            Cursor: pointer;

            Text-decoration: none;

            Display: flex;

            Align-items: center;

            Gap: 4px;

            User-select: none;

        }



        .theme-toggle-btn {

            Background: var(--bg-color);

            Border: 1px solid var(--border-color);

            Color: var(--text-color);

            Padding: 8px 14px;

            Border-radius: 20px;

            Cursor: pointer;

            Font-weight: 600;

            Font-size: 13px;

            Transition: 0.3s;

            Display: flex;

            Align-items: center;

            Gap: 6px;

        }



        /* --- VİDEO ALANI --- */

        .video-container {

            Width: 100%;

            Position: relative;

            Background: #000;

            Aspect-ratio: 16 / 9;

            Position: sticky;

            Top: 0;

            z-index: 1000;

            box-shadow: 0 4px 10px rgba(0,0,0,0.3);

            transition: all 0.3s;

        }



        .video-container.landscape-mode {

            Position: fixed;

            Top: 0;

            Left: 0;

            Width: 100vw;

            Height: 100vh;

            Aspect-ratio: auto;

            z-index: 9999;

        }



        Video {

            Width: 100%;

            Height: 100%;

            Object-fit: contain;

            Transition: opacity 0.2s ease-in-out;

        }



        .media-title-overlay {

            Position: absolute;

            Top: 15px;

            Left: 15px;

            Right: 70px;

            Background: rgba(0, 0, 0, 0.6);

            Color: #ffffff;

            Padding: 8px 15px;

            Border-radius: 8px;

            Font-size: 14px;

            Font-weight: 600;

            Backdrop-filter: blur(5px);

            z-index: 1015;

            opacity: 0;

            pointer-events: none;

            transition: opacity 0.3s ease;

            white-space: nowrap;

            overflow: hidden;

            text-overflow: ellipsis;

        }



        .video-container.show-controls .media-title-overlay {

            Opacity: 1;

        }



        .landscape-back-btn {

            Position: absolute;

            Top: 15px;

            Right: 15px;

            Background: rgba(0, 0, 0, 0.6);

            Color: white;

            Border: none;

            Width: 40px;

            Height: 40px;

            Border-radius: 50%;

            Display: none;

            Align-items: center;

            Justify-content: center;

            Font-size: 18px;

            Cursor: pointer;

            z-index: 1010;

            opacity: 0;

            transition: opacity 0.3s;

        }



        .video-container.landscape-mode .landscape-back-btn {

            Display: flex;

        }

        

        .video-container.show-controls .landscape-back-btn {

            Opacity: 1;

        }



        .video-controls {

            Position: absolute;

            Bottom: 0;

            Left: 0;

            Right: 0;

            Background: linear-gradient(transparent, rgba(0,0,0,0.95));

            Display: flex;

            Flex-direction: column;

            Padding: 5px 15px 10px 15px;

            Opacity: 0;

            Transition: opacity 0.3s;

            z-index: 1005;

        }



        .video-container.show-controls .video-controls {

            Opacity: 1;

        }



        .timeline-container {

            Width: 100%;

            Display: flex;

            Align-items: center;

            Gap: 10px;

            Margin-top: 8px;

            Order: 2;

            Position: relative;

        }



        .video-progress-bar {

            Flex: 1;

            Height: 6px;

            Background: rgba(255, 255, 255, 0.3);

            Border-radius: 3px;

            Position: relative;

            Cursor: pointer;

        }



        .video-progress-fill {

            Height: 100%;

            Width: 0%;

            Background: var(--accent-color);

            Border-radius: 3px;

        }



        .time-display {

            Font-size: 12px;

            Color: #fff;

            White-space: nowrap;

        }



        .seek-tooltip {

            Position: absolute;

            Bottom: 18px;

            Background: rgba(0, 0, 0, 0.8);

            Color: #fff;

            Padding: 2px 6px;

            Border-radius: 4px;

            Font-size: 11px;

            Font-weight: 600;

            Pointer-events: none;

            Display: none;

            Transform: translateX(-50%);

            z-index: 1020;

        }



        .skip-alert {

            Position: absolute;

            Top: 50%;

            Left: 50%;

            Transform: translate(-50%, -50%);

            Background: rgba(0, 0, 0, 0.7);

            Color: #fff;

            Padding: 10px 20px;

            Border-radius: 20px;

            Font-size: 16px;

            Font-weight: 700;

            Pointer-events: none;

            Opacity: 0;

            Transition: opacity 0.2s ease;

            z-index: 1015;

        }



        .skip-alert.show {

            Opacity: 1;

        }



        .control-row {

            Display: flex;

            Align-items: center;

            Justify-content: space-between;

            Width: 100%;

            Order: 1;

        }



        .control-group {

            Display: flex;

            Align-items: center;

            Gap: 10px;

        }



        .volume-container {

            Display: flex;

            Align-items: center;

            Color: white;

            Margin-left: 5px;

        }



        .control-btn {

            Background: none;

            Border: none;

            Color: white;

            Font-size: 18px;

            Cursor: pointer;

            Padding: 5px 10px;

            Display: flex;

            Align-items: center;

            Justify-content: center;

        }



        .center-controls {

            Position: absolute;

            Top: 45%;

            Left: 50%;

            Transform: translate(-50%, -50%);

            Display: flex;

            Gap: 30px;

            Opacity: 0;

            Transition: opacity 0.3s;

            Pointer-events: none;

            z-index: 1010;

        }



        .video-container.show-controls .center-controls {

            Opacity: 1;

            Pointer-events: auto;

        }



        .center-btn {

            Background: rgba(0, 0, 0, 0.6);

            Border: none;

            Color: white;

            Font-size: 24px;

            Width: 50px;

            Height: 50px;

            Border-radius: 50%;

            Cursor: pointer;

            Display: flex;

            Align-items: center;

            Justify-content: center;

        }



        .live-indicator {

            Color: #ff0055;

            Font-weight: bold;

            Font-size: 13px;

            Display: flex;

            Align-items: center;

            Gap: 5px;

            Animation: blinker 1.5s linear infinite;

        }



        @keyframes blinker {

            50% { opacity: 0.3; }

        }



        /* --- ANA İÇERİK ALANI --- */

        .content-area {

            Flex: 1;

            Display: flex;

            Flex-direction: column;

            Overflow-y: auto;

            Padding: 15px;

            Padding-bottom: 20px;

        }



        .section-header-row {

            Display: flex;

            Justify-content: space-between;

            Align-items: center;

            Margin-bottom: 12px;

            Gap: 10px;

        }
