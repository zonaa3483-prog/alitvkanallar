<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ƏLİ TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <style>
        /* Varsayılan Tema: BEYAZ (Gündüz Modu) */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --accent-color: #ff0055;
            --text-color: #1d1d1f;
            --text-dim: #6e6e73;
            --border-color: #e5e5ea;
        }

        /* Siyah Tema Değişkenleri (Gecə Modu) */
        [data-theme="dark"] {
            --bg-color: #0f0f0f;
            --card-bg: #1f1f1f;
            --accent-color: #ff0055;
            --text-color: #ffffff;
            --text-dim: #aaaaaa;
            --border-color: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* PC VE TABLETTE TELEFON GÖRÜNÜMÜNÜ ZORLAMA CSS */
        body {
            background-color: #1a1a1a;
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        .phone-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* --- ÜST BAR (BAŞLIK & TEMA) --- */
        .top-header-bar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-title-container {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .app-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-color);
            letter-spacing: 0.5px;
        }

        .ceo-header-link {
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-color);
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 4px;
            user-select: none;
        }

        .theme-toggle-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- VİDEO ALANI --- */
        .video-container {
            width: 100%;
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .video-container.landscape-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            aspect-ratio: auto;
            z-index: 9999;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            transition: opacity 0.2s ease-in-out;
        }

        .media-title-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 70px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            z-index: 1015;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-container.show-controls .media-title-overlay {
            opacity: 1;
        }

        .landscape-back-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            z-index: 1010;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-container.landscape-mode .landscape-back-btn {
            display: flex;
        }
        
        .video-container.show-controls .landscape-back-btn {
            opacity: 1;
        }

        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.95));
            display: flex;
            flex-direction: column;
            padding: 5px 15px 10px 15px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1005;
        }

        .video-container.show-controls .video-controls {
            opacity: 1;
        }

        .timeline-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            order: 2;
            position: relative;
        }

        .video-progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }

        .video-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            border-radius: 3px;
        }

        .time-display {
            font-size: 12px;
            color: #fff;
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
        }

        .seek-tooltip {
            position: absolute;
            bottom: 18px;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            pointer-events: none;
            display: none;
            transform: translateX(-50%);
            z-index: 1020;
        }

        .skip-alert {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            z-index: 1015;
        }

        .skip-alert.show {
            opacity: 1;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            order: 1;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-container {
            display: flex;
            align-items: center;
            color: white;
            margin-left: 5px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-controls {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 30px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1010;
        }

        .video-container.show-controls .center-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .center-btn {
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .live-indicator {
            color: #ff0055;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: blinker 1.5s linear infinite;
        }

        @keyframes blinker {
            50% { opacity: 0.3; }
        }

        /* --- ANA İÇERİK ALANI --- */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 20px;
        }

        .section-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 250px;
        }

        .search-input {
            width: 100%;
            padding: 6px 12px 6px 32px;
            font-size: 13px;
            border-radius: 15px;
            border: 1px solid var(--border-color);
            background: var(--card-bg);
            color: var(--text-color);
            outline: none;
            transition: 0.3s;
        }

        .search-container i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 13px;
        }

        .status-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 16px;
        }

        .status-msg i {
            display: block;
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        /* --- AKORDİYON KATEGORİ VE LİSTE --- */
        .category-accordion {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .accordion-item {
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: 0.3s;
        }

        .accordion-item.hidden-by-search {
            display: none !important;
        }

        .accordion-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            font-size: 15px;
        }

        .accordion-header .count-badge {
            background: rgba(255, 0, 85, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
        }

        .accordion-header i {
            transition: transform 0.3s;
            color: var(--text-dim);
        }

        .accordion-item.active .accordion-header i {
            transform: rotate(180deg);
            color: var(--accent-color);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: rgba(0, 0, 0, 0.01);
        }

        .accordion-item.active .accordion-content {
            max-height: 500px;
            overflow-y: auto;
            border-top: 1px solid var(--border-color);
        }

        .stream-list {
            display: flex;
            flex-direction: column;
        }

        .stream-list-item {
            display: flex;
            align-items: center;
            padding: 14px 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .stream-list-item.hidden-by-search {
            display: none !important;
        }

        .stream-list-item:last-child {
            border-bottom: none;
        }

        .stream-list-item.playing-active {
            background: var(--accent-color) !important;
            color: #ffffff !important;
        }

        .stream-list-item.playing-active .stream-name {
            color: #ffffff !important;
        }

        .stream-details {
            flex: 1;
            min-width: 0;
        }

        .stream-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="top-header-bar">
            <div class="app-title-container">
                <div class="app-title"><i class="fas fa-play-circle"></i> ƏLİ TV</div>
                <div class="ceo-header-link" onclick="saveStateAndRedirect()">
                    <i class="fas fa-user-shield"></i> Qurucu: Əli Məhərrəmov
                </div>
            </div>
            <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">
                <i class="fas fa-moon"></i> Gecə
            </button>
        </div>

        <div class="video-container" id="videoContainer">
            <div class="media-title-overlay" id="mediaTitleOverlay">Oynatılan Yayın Seçilmedi</div>

            <button class="landscape-back-btn" id="landscapeBackBtn" onclick="event.stopPropagation(); exitLandscape();" title="Geri Dön">
                <i class="fas fa-arrow-left"></i>
            </button>

            <video id="mainPlayer" playsinline></video>
            
            <div class="skip-alert" id="skipAlert">+10s</div>

            <div class="center-controls" id="centerControls">
                <button class="center-btn VOD-control" onclick="event.stopPropagation(); rewind();"><i class="fas fa-backward"></i></button>
                <button class="center-btn" id="centerPlayBtn" onclick="event.stopPropagation(); togglePlay();"><i class="fas fa-play"></i></button>
                <button class="center-btn VOD-control" onclick="event.stopPropagation(); forward();"><i class="fas fa-forward"></i></button>
            </div>

            <div class="video-controls" id="videoControls">
                <div class="control-row" onclick="event.stopPropagation();">
                    <div class="control-group">
                        <button class="control-btn" onclick="togglePlay()" id="playBtn"><i class="fas fa-pause"></i></button>
                        <button class="control-btn VOD-control" onclick="rewind()"><i class="fas fa-undo"></i></button>
                        <button class="control-btn VOD-control" onclick="forward()"><i class="fas fa-redo"></i></button>
                        
                        <div class="volume-container">
                            <button class="control-btn" onclick="toggleMute()" id="muteBtn" style="padding: 5px 2px; font-size: 16px;">
                                <i class="fas fa-volume-up"></i>
                            </button>
                        </div>
                    </div>
                    <div class="control-group">
                        <button class="control-btn" onclick="toggleRotate()" id="rotateBtn" title="Ekranı Çevir"><i class="fas fa-sync-alt"></i></button>
                        <button class="control-btn" onclick="togglePip()" id="pipBtn" title="PiP Modu"><i class="fas fa-compress"></i></button>
                        <button class="control-btn" onclick="toggleFullscreen()" title="Tam Ekran"><i class="fas fa-expand"></i></button>
                    </div>
                </div>

                <div class="timeline-container" id="timelineContainer" onclick="event.stopPropagation();">
                    <div class="seek-tooltip" id="seekTooltip">00:00</div>
                    <div class="video-progress-bar" id="progressBar" onclick="seekVideo(event)" onmousemove="showTooltip(event)" onmouseleave="hideTooltip()" ontouchmove="showTooltip(event)" ontouchend="hideTooltip()">
                        <div class="video-progress-fill" id="progressFill"></div>
                    </div>
                    <div class="time-display" id="timeDisplay" onclick="toggleTimeMode()">00:00 / 00:00</div>
                </div>
            </div>
        </div>

        <div class="content-area">
            <div class="section-header-row">
                <div class="section-title">
                    <i class="fas fa-film"></i> Canlı Tvlər və Kinolar
                </div>
                <div class="search-container" id="searchBoxContainer" style="display: none;">
                    <i class="fas fa-search"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Axtar..." oninput="filterPlaylist()">
                </div>
            </div>

            <div id="statusLayout" class="status-msg">
                <i class="fas fa-spinner fa-spin"></i>
                <span>Yüklənir...</span>
            </div>

            <div id="mainLayout" style="display: none;">
                <div class="category-accordion" id="accordionContainer"></div>
            </div>
        </div>
    </div>

    <script>
        const INTERNAL_M3U_URL = "https://raw.githubusercontent.com/zonaa3483-prog/eli-iptv-siyahi/refs/heads/main/alimtv.m3u"; 

        // OTTPLAYER MANTIĞI İÇİN MERKEZİ CORS VE PROXY HAVUZU
        const CORS_PROXIES = [
            "", 
            "https://api.allorigins.win/raw?url=",
            "https://corsproxy.io/?",
            "https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=600&url="
        ];

        const PLAYLIST_DATA = { series: {} };
        let currentTheme = 'light'; 
        let hls = null;
        let controlsTimeout = null;
        let isChangingPip = false; 
        let wakeLock = null; 
        let isLiveStream = false;
        let timeMode = 'normal'; // normal veya remaining (kalan süre)
        let proxyIndex = 0;
        
        const video = document.getElementById('mainPlayer');
        const videoContainer = document.getElementById('videoContainer');
        const videoControls = document.getElementById('videoControls');
        const playBtn = document.getElementById('playBtn');
        const centerPlayBtn = document.getElementById('centerPlayBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const mediaTitleOverlay = document.getElementById('mediaTitleOverlay');
        const seekTooltip = document.getElementById('seekTooltip');
        const skipAlert = document.getElementById('skipAlert');
        const timelineContainer = document.getElementById('timelineContainer');
        const muteBtn = document.getElementById('muteBtn');

        video.addEventListener('playing', () => { video.style.opacity = "1"; });

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    if (wakeLock !== null) { await wakeLock.release(); wakeLock = null; }
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.log(`Wake Lock hatası: ${err.message}`); }
        }

        async function fetchAndParseM3U() {
            try {
                const response = await fetch(INTERNAL_M3U_URL);
                if (!response.ok) throw new Error("Ağ hatası oluştu.");
                const text = await response.text();
                
                const lines = text.split('\n');
                let currentItemInfo = null;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    if (line.startsWith('#EXTINF:')) {
                        const groupMatch = line.match(/group-title="([^"]+)"/);
                        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                        const commaIndex = line.indexOf(',');
                        const title = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : "Bilinmeyen Başlık";
                        const group = groupMatch ? groupMatch[1] : "Diğer Listeler";
                        currentItemInfo = { title, logo: logoMatch ? logoMatch[1] : "", group };
                    } else if (line.startsWith('http') && currentItemInfo) {
                        if (!PLAYLIST_DATA.series[currentItemInfo.group]) {
                            PLAYLIST_DATA.series[currentItemInfo.group] = [];
                        }
                        PLAYLIST_DATA.series[currentItemInfo.group].push({
                            title: currentItemInfo.title,
                            logo: currentItemInfo.logo,
                            url: line
                        });
                        currentItemInfo = null;
                    }
                }
                for (const g in PLAYLIST_DATA.series) {
                    if (PLAYLIST_DATA.series[g].length === 0) delete PLAYLIST_DATA.series[g];
                }
                initUI();
            } catch (error) {
                document.getElementById('statusLayout').innerHTML = `
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Oynatma listesi yüklenemedi!<br><small>${error.message}</small></span>
                `;
            }
        }

        function initUI() {
            if (Object.keys(PLAYLIST_DATA.series).length === 0) {
                document.getElementById('statusLayout').innerHTML = `<i class="fas fa-folder-open"></i><span>M3U içeriği boş veya ayrıştırılamadı.</span>`;
                return;
            }
            document.getElementById('statusLayout').style.display = 'none';
            document.getElementById('mainLayout').style.display = 'block';
            document.getElementById('searchBoxContainer').style.display = 'block';
            renderAccordion();
            restoreAppState();
        }

        function renderAccordion() {
            const container = document.getElementById('accordionContainer');
            container.innerHTML = '';
            Object.keys(PLAYLIST_DATA.series).forEach((catName) => {
                const items = PLAYLIST_DATA.series[catName];
                const accordionItem = document.createElement('div');
                accordionItem.className = 'accordion-item'; 
                accordionItem.setAttribute('data-catname', catName);
                
                accordionItem.innerHTML = `
                    <div class="accordion-header">
                        <div><span class="cat-text">${catName}</span> <span class="count-badge">${items.length}</span></div>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="accordion-content"><div class="stream-list"></div></div>
                `;
                
                const streamList = accordionItem.querySelector('.stream-list');
                items.forEach(item => {
                    const listItem = document.createElement('div');
                    listItem.className = 'stream-list-item';
                    listItem.setAttribute('data-url', item.url);
                    listItem.onclick = () => playMedia(item.url, item.title, listItem, catName);
                    listItem.innerHTML = `<div class="stream-details"><div class="stream-name">${item.title}</div></div>`;
                    streamList.appendChild(listItem);
                });
                
                accordionItem.querySelector('.accordion-header').onclick = () => {
                    accordionItem.classList.toggle('active');
                };
                container.appendChild(accordionItem);
            });
        }

        function filterPlaylist() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            document.querySelectorAll('.accordion-item').forEach(item => {
                const catText = item.querySelector('.cat-text').innerText.toLowerCase();
                let matchCount = 0;
                item.querySelectorAll('.stream-list-item').forEach(stream => {
                    const streamName = stream.querySelector('.stream-name').innerText.toLowerCase();
                    if (streamName.includes(query) || catText.includes(query)) {
                        stream.classList.remove('hidden-by-search');
                        matchCount++;
                    } else { stream.classList.add('hidden-by-search'); }
                });
                if (matchCount > 0 || query === '') {
                    item.classList.remove('hidden-by-search');
                    if (query !== '') item.classList.add('active');
                } else { item.classList.add('hidden-by-search'); }
            });
        }

        function toggleMute() {
            video.muted = !video.muted;
            video.volume = video.muted ? 0 : 1;
            muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        }

        // YOUTUBE TARZI SAYAÇ DEĞİŞTİRME FONKSİYONU
        function toggleTimeMode() {
            if(isLiveStream) return;
            timeMode = (timeMode === 'normal') ? 'remaining' : 'normal';
            video.dispatchEvent(new Event('timeupdate'));
        }

        // KESİNTİSİZ DEVAM ETME SİSTEMİ
        function saveStateAndRedirect() {
            const state = {
                url: video.getAttribute('data-current-url') || '',
                title: mediaTitleOverlay.innerText,
                category: video.getAttribute('data-current-cat') || '',
                time: video.currentTime || 0,
                isLive: isLiveStream,
                theme: currentTheme,
                timestamp: Date.now()
            };
            localStorage.setItem('elitv_state', JSON.stringify(state));
            window.open('https://elimeherremov.taplink.ws/', '_blank');
        }

        function restoreAppState() {
            const saved = localStorage.getItem('elitv_state');
            if (!saved) return;
            try {
                const state = JSON.parse(saved);
                if (state.url) {
                    document.querySelectorAll('.accordion-item').forEach(item => {
                        if (item.getAttribute('data-catname') === state.category) {
                            item.classList.add('active');
                            item.querySelectorAll('.stream-list-item').forEach(str => {
                                if (str.getAttribute('data-url') === state.url) str.classList.add('playing-active');
                            });
                        }
                    });
                    playMedia(state.url, state.title, null, state.category);
                    if (!state.isLive && state.time > 0) {
                        const onTimeInit = () => {
                            video.currentTime = state.time;
                            video.removeEventListener('loadedmetadata', onTimeInit);
                        };
                        video.addEventListener('loadedmetadata', onTimeInit);
                    }
                }
                if (state.theme === 'dark') toggleTheme();
            } catch(e) { console.log(e); }
        }

        // OTTPLAYER VE CORS ENGELİNİ AŞAN GELİŞTİRİLMİŞ OYNATICI MOTORU
        function playMedia(url, title, element, categoryName) {
            video.pause();
            proxyIndex = 0; 
            const lowerCat = categoryName ? categoryName.toLowerCase() : "";
            const lowerUrl = url.toLowerCase();
            
            if (lowerCat.includes("dizi") || lowerCat.includes("müzik") || lowerCat.includes("muzik") || lowerCat.includes("vod") || lowerUrl.includes(".mp4") || lowerUrl.includes(".mkv") || lowerCat.includes("kino") || lowerCat.includes("film")) {
                isLiveStream = false;
                video.style.opacity = "1";
            } else {
                isLiveStream = true; 
                video.style.opacity = "0"; 
            }

            video.src = "";
            video.removeAttribute("src");
            progressFill.style.width = '0%';
            if (hls) { hls.destroy(); hls = null; }

            video.setAttribute('data-current-url', url);
            video.setAttribute('data-current-cat', categoryName || '');
            toggleControlElements();

            document.querySelectorAll('.stream-list-item').forEach(el => el.classList.remove('playing-active'));
            if(element) element.classList.add('playing-active');

            mediaTitleOverlay.innerText = title || "Bilinmeyen Yayın";
            buildStreamingEngine(url);

            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            centerPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
            showControlsTemporarily();
        }

        function buildStreamingEngine(targetUrl) {
            let processedUrl = targetUrl;
            if(proxyIndex > 0 && proxyIndex < CORS_PROXIES.length) {
                processedUrl = CORS_PROXIES[proxyIndex] + encodeURIComponent(targetUrl);
            }

            if (Hls.isSupported()) {
                if(hls) hls.destroy();
                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 30,
                    appendErrorMaxRetry: 50,
                    progressive: true,
                    forceKeyFrameOnDiscontinuity: true
                });
                hls.loadSource(processedUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => { video.play().catch(e=>console.log(e)); requestWakeLock(); });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        if(proxyIndex < CORS_PROXIES.length - 1) {
                            proxyIndex++;
                            buildStreamingEngine(targetUrl);
                        } else {
                            hls.recoverMediaError();
                        }
                    }
                });
            } else {
                video.src = processedUrl;
                video.load();
                video.play().catch(() => {
                    if(proxyIndex < CORS_PROXIES.length - 1) {
                        proxyIndex++;
                        buildStreamingEngine(targetUrl);
                    }
                });
            }
        }

        function toggleControlElements() {
            const vodControls = document.querySelectorAll('.VOD-control');
            if (isLiveStream) {
                vodControls.forEach(el => el.style.setProperty('display', 'none', 'important'));
                progressBar.style.pointerEvents = 'none';
                timeDisplay.innerHTML = '<span class="live-indicator"><i class="fas fa-circle"></i> CANLI YAYIN</span>';
            } else {
                vodControls.forEach(el => el.style.setProperty('display', '', 'important'));
                progressBar.style.pointerEvents = 'auto';
                timeDisplay.innerText = "00:00 / 00:00";
            }
        }

        video.addEventListener('timeupdate', () => {
            if (isLiveStream) return;
            if (video.duration && isFinite(video.duration) && video.duration > 0) {
                const currentSecs = Math.floor(video.currentTime);
                const totalSecs = Math.floor(video.duration);
                
                let timeText = "";
                if(timeMode === 'normal') {
                    timeText = `${formatTime(currentSecs, totalSecs)} / ${formatTime(totalSecs, totalSecs)}`;
                } else {
                    let remainingSecs = totalSecs - currentSecs;
                    timeText = `${formatTime(currentSecs, totalSecs)} / -${formatTime(remainingSecs, totalSecs)}`;
                }
                
                timeDisplay.innerText = timeText;
                progressFill.style.width = `${(video.currentTime / video.duration) * 100}%`;
            }
        });

        function formatTime(totalSeconds, videoDuration) {
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;
            const hDisplay = hours < 10 ? '0' + hours : hours;
            const mDisplay = minutes < 10 ? '0' + minutes : minutes;
            const sDisplay = seconds < 10 ? '0' + seconds : seconds;
            return Math.floor(videoDuration / 3600) > 0 ? `${hDisplay}:${mDisplay}:${sDisplay}` : `${mDisplay}:${sDisplay}`;
        }

        function showTooltip(event) {
            if (isLiveStream || !video.duration || !isFinite(video.duration)) return;
            const rect = progressBar.getBoundingClientRect();
            let clientX = event.clientX || (event.touches ? event.touches[0].clientX : 0);
            let clickX = Math.max(0, Math.min(clientX - rect.left, rect.width));
            seekTooltip.innerText = formatTime(Math.floor((clickX / rect.width) * video.duration), video.duration);
            seekTooltip.style.left = `${clickX}px`;
            seekTooltip.style.display = 'block';
        }

        function hideTooltip() { seekTooltip.style.display = 'none'; }
        function seekVideo(event) {
            if (isLiveStream || !video.duration || !isFinite(video.duration)) return;
            const rect = progressBar.getBoundingClientRect();
            video.currentTime = Math.floor(((event.clientX - rect.left) / rect.width) * video.duration);
        }

        function togglePlay() {
            if (video.paused) { video.play().catch(e=>console.log(e)); } else { video.pause(); }
            playBtn.innerHTML = video.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            centerPlayBtn.innerHTML = video.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
            showControlsTemporarily();
        }

        function forward() { if (isLiveStream) return; video.currentTime += 10; triggerSkipAlert("+10s"); }
        function rewind() { if (isLiveStream) return; video.currentTime -= 10; triggerSkipAlert("-10s"); }
        function triggerSkipAlert(text) {
            skipAlert.innerText = text; skipAlert.classList.add('show');
            setTimeout(() => skipAlert.classList.remove('show'), 500);
        }

        videoContainer.addEventListener('click', (e) => {
            if (!videoControls.contains(e.target) && !e.target.closest('.center-btn')) showControlsTemporarily();
        });

        function showControlsTemporarily() {
            videoContainer.classList.add('show-controls');
            if (controlsTimeout) clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => { if (!video.paused) videoContainer.classList.remove('show-controls'); }, 3000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (videoContainer.requestFullscreen) videoContainer.requestFullscreen();
                else if (videoContainer.webkitRequestFullscreen) videoContainer.webkitRequestFullscreen();
            } else { document.exitFullscreen(); }
        }

        function toggleRotate() { if (!videoContainer.classList.contains('landscape-mode')) enterLandscape(); else exitLandscape(); }
        function enterLandscape() {
            videoContainer.classList.add('landscape-mode');
            if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(()=>{});
            showControlsTemporarily();
        }
        function exitLandscape() {
            videoContainer.classList.remove('landscape-mode');
            if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
            showControlsTemporarily();
        }

        // WEBVIEW VE MOBİLDE EN ÜST DÜZEY ZORLAYICI PIP SİSTEMİ
        async function togglePip() {
            try {
                isChangingPip = true;
                if (document.pictureInPictureEnabled && video.requestPictureInPicture) {
                    if (video !== document.pictureInPictureElement) await video.requestPictureInPicture();
                    else await document.exitPictureInPicture();
                } else if (video.webkitSupportsPresentationMode && typeof video.webkitSetPresentationMode === "function") {
                    video.webkitSetPresentationMode(video.webkitPresentationMode === "picture-in-picture" ? "inline" : "picture-in-picture");
                } else {
                    alert("Cihazınız arka planda otomatik PiP özelliğini tam desteklememektedir.");
                }
            } catch (error) { console.log(error); } finally { isChangingPip = false; }
        }

        // UYGULAMADAN ÇIKINCA VEYA ARKA PLANA GEÇİNCE OTOMATİK PiP TETİKLEYİCİSİ
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden' && !video.paused && !isLiveStream) {
                togglePip(); 
            } else if (document.visibilityState === 'visible') {
                requestWakeLock();
                // CEO dönüşünde kaldığı yerden devam ettirme koruması garantiye alınır
                if(video.paused && video.getAttribute('data-current-url')) {
                    video.play().catch(()=>{});
                }
            }
        });

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme'); currentTheme = 'light';
                btn.innerHTML = '<i class="fas fa-moon"></i> Gece';
            } else {
                body.setAttribute('data-theme', 'dark'); currentTheme = 'dark';
                btn.innerHTML = '<i class="fas fa-sun"></i> Gündüz';
            }
        }

        window.onload = () => { fetchAndParseM3U(); requestWakeLock(); };
    </script>
</body>
