<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ƏLİ TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <style>
        :root { --bg-color: #f5f5f7; --card-bg: #ffffff; --accent-color: #ff0055; --text-color: #1d1d1f; --text-dim: #6e6e73; --border-color: #e5e5ea; }
        [data-theme="dark"] { --bg-color: #0f0f0f; --card-bg: #1f1f1f; --accent-color: #ff0055; --text-color: #ffffff; --text-dim: #aaaaaa; --border-color: #2a2a2a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-color); height: 100vh; overflow-y: auto; }

        /* VİDEO DÖNDÜRÜLMƏSİ (LANDSCAPE) */
        .video-container { position: sticky; top: 0; z-index: 1000; background: #000; aspect-ratio: 16 / 9; }
        
        .video-container.landscape-mode {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            transform: rotate(90deg) !important;
            transform-origin: center center !important;
            z-index: 99999 !important;
            overflow: hidden !important;
        }

        .video-container.landscape-mode video {
            width: 100vh !important;
            height: 100vw !important;
            object-fit: contain !important;
        }

        video { width: 100%; height: 100%; background: #000; }
        /* Digər CSS-lər eyni qaldı... */
    </style>
</head>
<body>
    <div class="video-container" id="videoContainer">
        <video id="mainPlayer" playsinline></video>
        </div>

    <script>
        const INTERNAL_M3U_URL = "https://raw.githubusercontent.com/zonaa3483-prog/eli-iptv-siyahi/refs/heads/main/alimtv.m3u"; 
        
        // M3U YÜKLƏNMƏSİ OPTİMALLAŞDIRILDI
        async function fetchAndParseM3U() {
            try {
                // cache: no-cache əlavə edildi ki, sürətli yüklənsin
                const response = await fetch(INTERNAL_M3U_URL, { cache: 'no-cache' });
                if (!response.ok) throw new Error("Yükləmə xətası");
                const text = await response.text();
                
                // Məntiq eynidir...
                // ... (Orijinal M3U parsing funksiyasını buraya yaz) ...
                
                initUI();
            } catch (error) {
                console.error(error);
            }
        }

        // TAM EKRAN DÖNDÜRMƏ MƏNTİQİ
        function toggleRotate() {
            const vc = document.getElementById('videoContainer');
            if (!vc.classList.contains('landscape-mode')) {
                vc.classList.add('landscape-mode');
                // Məcburi Fullscreen
                if (vc.requestFullscreen) vc.requestFullscreen();
            } else {
                vc.classList.remove('landscape-mode');
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }

        window.onload = () => {
            fetchAndParseM3U();
        };
    </script>
</body>
</html>
