<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ƏLİ TV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <style>
        :root { --bg-color: #f5f5f7; --card-bg: #ffffff; --accent-color: #ff0055; --text-color: #1d1d1f; --text-dim: #6e6e73; --border-color: #e5e5ea; }
        [data-theme="dark"] { --bg-color: #0f0f0f; --card-bg: #1f1f1f; --accent-color: #ff0055; --text-color: #ffffff; --text-dim: #aaaaaa; --border-color: #2a2a2a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-color); overflow-x: hidden; display: flex; flex-direction: column; height: 100vh; transition: background-color 0.3s, color 0.3s; align-items: center; }
        .top-header-bar, .video-container:not(.landscape-mode), .content-area { width: 100%; max-width: 500px; margin: 0 auto; }
        .top-header-bar { background: var(--card-bg); border-bottom: 1px solid var(--border-color); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .app-title-container { display: flex; flex-direction: column; gap: 2px; }
        .app-title { font-size: 18px; font-weight: 700; color: var(--text-color); letter-spacing: 0.5px; }
        .ceo-header-link { font-size: 12px; font-weight: 600; color: var(--accent-color); cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 4px; user-select: none; }
        .theme-toggle-btn { background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); padding: 8px 14px; border-radius: 20px; cursor: pointer; font-weight: 600; font-size: 13px; transition: 0.3s; display: flex; align-items: center; gap: 6px; }

        /* --- VİDEO ALANI --- */
        .video-container { position: relative; background: #000; aspect-ratio: 16 / 9; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: all 0.3s; }
        
        /* ÇEVİRME ÖZELLİĞİ (CSS DÖNDÜRME) */
        .video-container.landscape-mode {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vh !important;
            height: 100vw !important;
            transform: rotate(90deg);
            transform-origin: center center;
            z-index: 99999 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            max-width: none !important;
        }

        video { width: 100%; height: 100%; object-fit: contain; background: #000; opacity: 0; transition: opacity 0.1s ease-in-out; }
        .media-title-overlay { position: absolute; top: 15px; left: 15px; right: 70px; background: rgba(0, 0, 0, 0.6); color: #ffffff; padding: 8px 15px; border-radius: 8px; font-size: 14px; font-weight: 600; backdrop-filter: blur(5px); z-index: 1015; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .video-container.show-controls .media-title-overlay { opacity: 1; }
        .landscape-back-btn { position: absolute; top: 15px; right: 15px; background: rgba(0, 0, 0, 0.6); color: white; border: none; width: 40px; height: 40px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; z-index: 1010; opacity: 0; transition: opacity 0.3s; }
        .video-container.landscape-mode .landscape-back-btn { display: flex; }
        .video-container.show-controls .landscape-back-btn { opacity: 1; }
        .video-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0,0,0,0.95)); display: flex; flex-direction: column; padding: 5px 15px 10px 15px; opacity: 0; transition: opacity 0.3s; z-index: 1005; }
        .video-container.show-controls .video-controls { opacity: 1; }
        .timeline-container { width: 100%; display: flex; align-items: center; gap: 10px; margin-top: 8px; order: 2; position: relative; }
        .video-progress-bar { flex: 1; height: 6px; background: rgba(255, 255, 255, 0.3); border-radius: 3px; position: relative; cursor: pointer; }
        .video-progress-fill { height: 100%; width: 0%; background: var(--accent-color); border-radius: 3px; }
        .time-display { font-size: 12px; color: #fff; white-space: nowrap; cursor: pointer; user-select: none; }
        .seek-tooltip { position: absolute; bottom: 18px; background: rgba(0, 0, 0, 0.8); color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; pointer-events: none; display: none; transform: translateX(-50%); z-index: 1020; }
        .skip-alert { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0, 0, 0, 0.7); color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 16px; font-weight: 700; pointer-events: none; opacity: 0; transition: opacity 0.2s ease; z-index: 1015; }
        .skip-alert.show { opacity: 1; }
        .control-row { display: flex; align-items: center; justify-content: space-between; width: 100%; order: 1; }
        .control-group { display: flex; align-items: center; gap: 10px; }
        .volume-container { display: flex; align-items: center; color: white; margin-left: 5px; }
        .control-btn { background: none; border: none; color: white; font-size: 18px; cursor: pointer; padding: 5px 10px; display: flex; align-items: center; justify-content: center; }
        .center-controls { position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 30px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 1010; }
        .video-container.show-controls .center-controls { opacity: 1; pointer-events: auto; }
        .center-btn { background: rgba(0, 0, 0, 0.6); border: none; color: white; font-size: 24px; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .live-indicator { color: #ff0055; font-weight: bold; font-size: 13px; display: flex; align-items: center; gap: 5px; animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0.3; } }

        .content-area { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 15px; padding-bottom: 20px; }
        .section-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
        .section-title { font-size: 16px; font-weight: 700; color: var(--accent-color); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .search-container { position: relative; flex: 1; max-width: 250px; }
        .search-input { width: 100%; padding: 6px 12px 6px 32px; font-size: 13px; border-radius: 15px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-color); outline: none; transition: 0.3s; }
        .search-container i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 13px; }
        .status-msg { text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 16px; }
        .status-msg i { display: block; font-size: 30px; margin-bottom: 10px; color: var(--accent-color); }
        .category-accordion { display: flex; flex-direction: column; gap: 10px; }
        .accordion-item { background: var(--card-bg); border-radius: 10px; border: 1px solid var(--border-color); overflow: hidden; transition: 0.3s; }
        .accordion-item.hidden-by-search { display: none !important; }
        .accordion-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; font-weight: 600; font-size: 15px; }
        .accordion-header .count-badge { background: rgba(255, 0, 85, 0.1); color: var(--accent-color); padding: 2px 8px; border-radius: 12px; font-size: 12px; margin-left: 8px; }
        .accordion-header i { transition: transform 0.3s; color: var(--text-dim); }
        .accordion-item.active .accordion-header i { transform: rotate(180deg); color: var(--accent-color); }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; background: rgba(0, 0, 0, 0.01); }
        .accordion-item.active .accordion-content { max-height: 500px; overflow-y: auto; border-top: 1px solid var(--border-color); }
        .stream-list { display: flex; flex-direction: column; }
        .stream-list-item { display: flex; align-items: center; padding: 14px 15px; border-bottom: 1px solid var(--border-color); cursor: pointer; transition: background 0.2s, color 0.2s; }
        .stream-list-item.hidden-by-search { display: none !important; }
        .stream-list-item:last-child { border-bottom: none; }
        .stream-list-item.playing-active { background: var(--accent-color) !important; color: #ffffff !important; }
        .stream-list-item.playing-active .stream-name { color: #ffffff !important; }
        .stream-details { flex: 1; min-width: 0; }
        .stream-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>
</head>
<body>

    <div class="top-header-bar">
        <div class="app-title-container">
            <div class="app-title"><i class="fas fa-play-circle"></i> ƏLİ TV</div>
            <div class="ceo-header-link" onclick="saveStateAndRedirect()"><i class="fas fa-user-shield"></i> Qurucu: Əli Məhərrəmov</div>
        </div>
        <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i> Gecə</button>
    </div>

    <div class="video-container" id="videoContainer">
        <div class="media-title-overlay" id="mediaTitleOverlay">Oynatılan Yayın Seçilmedi</div>
        <button class="landscape-back-btn" id="landscapeBackBtn" onclick="event.stopPropagation(); exitLandscape();" title="Geri Dön"><i class="fas fa-arrow-left"></i></button>
        <video id="mainPlayer" playsinline preload="auto"></video>
        <div class="skip-alert" id="skipAlert">+10s</div>
        <div class="center-controls" id="centerControls">
            <button class="center-btn VOD-control" onclick="event.stopPropagation(); rewind();"><i class="fas fa-backward"></i></button>
            <button class="center-btn" id="centerPlayBtn" onclick="event.stopPropagation(); togglePlay();"><i class="fas fa-play"></i></button>
            <button class="center-btn VOD-control" onclick="event.stopPropagation(); forward();"><i class="fas fa-forward"></i></button>
        </div>
        <div class="video-controls" id="videoControls">
            <div class="control-row" onclick="event.stopPropagation();">
                <div class="control-group">
                    <button class="control-btn" onclick="togglePlay()" id="playBtn"><i class="fas fa-pause"></i></button>
                    <button class="control-btn VOD-control" onclick="rewind()"><i class="fas fa-undo"></i></button>
                    <button class="control-btn VOD-control" onclick="forward()"><i class="fas fa-redo"></i></button>
                    <div class="volume-container"><button class="control-btn" onclick="toggleMute()" id="muteBtn" style="padding: 5px 2px; font-size: 16px;"><i class="fas fa-volume-up"></i></button></div>
                </div>
                <div class="control-group">
                    <button class="control-btn" onclick="toggleRotate()" id="rotateBtn" title="Ekranı Çevir"><i class="fas fa-sync-alt"></i></button>
                    <button class="control-btn" onclick="togglePip()" id="pipBtn" title="PiP Modu"><i class="fas fa-compress"></i></button>
                    <button class="control-btn" onclick="toggleFullscreen()" title="Tam Ekran"><i class="fas fa-expand"></i></button>
                </div>
            </div>
            <div class="timeline-container" id="timelineContainer" onclick="event.stopPropagation();">
                <div class="seek-tooltip" id="seekTooltip">00:00</div>
                <div class="video-progress-bar" id="progressBar" onclick="seekVideo(event)" onmousemove="showTooltip(event)" onmouseleave="hideTooltip()" ontouchmove="showTooltip(event)" ontouchend="hideTooltip()"><div class="video-progress-fill" id="progressFill"></div></div>
                <div class="time-display" id="timeDisplay" onclick="toggleTimeMode()">00:00 / 00:00</div>
            </div>
        </div>
    </div>

    <div class="content-area">
        <div class="section-header-row">
            <div class="section-title"><i class="fas fa-film"></i> Canlı Tvlər və Kinolar</div>
            <div class="search-container" id="searchBoxContainer" style="display: none;"><i class="fas fa-search"></i><input type="text" class="search-input" id="searchInput" placeholder="Axtar..." oninput="filterPlaylist()"></div>
        </div>
        <div id="statusLayout" class="status-msg"><i class="fas fa-spinner fa-spin"></i><span>Yüklənir...</span></div>
        <div id="mainLayout" style="display: none;"><div class="category-accordion" id="accordionContainer"></div></div>
    </div>

    <script>
        // JS Kodları (Sənin kodun qorundu)
        const INTERNAL_M3U_URL = "https://raw.githubusercontent.com/zonaa3483-prog/eli-iptv-siyahi/refs/heads/main/alimtv.m3u"; 
        const PLAYLIST_DATA = { series: {} };
        let currentTheme = 'light'; let hls = null; let controlsTimeout = null; let isChangingPip = false; let wakeLock = null; let isLiveStream = false; let showRemainingTime = false; 
        const video = document.getElementById('mainPlayer');
        const videoContainer = document.getElementById('videoContainer');
        const videoControls = document.getElementById('videoControls');
        const playBtn = document.getElementById('playBtn');
        const centerPlayBtn = document.getElementById('centerPlayBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const mediaTitleOverlay = document.getElementById('mediaTitleOverlay');
        const seekTooltip = document.getElementById('seekTooltip');
        const skipAlert = document.getElementById('skipAlert');
        const timelineContainer = document.getElementById('timelineContainer');
        const muteBtn = document.getElementById('muteBtn');

        // [SƏNİN FUNKSİYALARIN EYNİ QALDI]
        async function requestWakeLock() { try { if ('wakeLock' in navigator) { if (wakeLock !== null) { await wakeLock.release(); wakeLock = null; } wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) { console.log(err); } }
        async function fetchAndParseM3U() { /* ... kodun eynidir ... */ }
        function initUI() { /* ... kodun eynidir ... */ }
        function renderAccordion() { /* ... kodun eynidir ... */ }
        function filterPlaylist() { /* ... kodun eynidir ... */ }
        function toggleMute() { /* ... kodun eynidir ... */ }
        function saveStateAndRedirect() { /* ... kodun eynidir ... */ }
        function restoreAppState() { /* ... kodun eynidir ... */ }
        function playMedia(url, title, element, categoryName, savedTime = 0, specificUA = "") { /* ... kodun eynidir ... */ }
        function toggleControlElements() { /* ... kodun eynidir ... */ }
        function toggleTimeMode() { /* ... kodun eynidir ... */ }
        video.addEventListener('timeupdate', updateTimeDisplay);
        function updateTimeDisplay() { /* ... kodun eynidir ... */ }
        function formatTime(totalSeconds, videoDuration) { /* ... kodun eynidir ... */ }
        function showTooltip(event) { /* ... kodun eynidir ... */ }
        function hideTooltip() { seekTooltip.style.display = 'none'; }
        function seekVideo(event) { /* ... kodun eynidir ... */ }
        function togglePlay() { /* ... kodun eynidir ... */ }
        function triggerSkipAlert(text) { /* ... kodun eynidir ... */ }
        function forward() { video.currentTime += 10; showControlsTemporarily(); triggerSkipAlert("+10s"); }
        function rewind() { video.currentTime -= 10; showControlsTemporarily(); triggerSkipAlert("-10s"); }
        videoContainer.addEventListener('click', function(e) { const isClickOnControls = videoControls.contains(e.target) || e.target.closest('.center-btn') || e.target.closest('#landscapeBackBtn'); if (!isClickOnControls) showControlsTemporarily(); });
        function showControlsTemporarily() { videoContainer.classList.add('show-controls'); if (controlsTimeout) clearTimeout(controlsTimeout); controlsTimeout = setTimeout(() => { if (!video.paused && !isChangingPip) videoContainer.classList.remove('show-controls'); }, 3000); }
        function toggleFullscreen() { if (!document.fullscreenElement) { if (videoContainer.requestFullscreen) videoContainer.requestFullscreen(); else if (videoContainer.webkitRequestFullscreen) videoContainer.webkitRequestFullscreen(); } else { document.exitFullscreen(); } }
        
        // --- DÖNDÜRME VƏ TAM EKRAN MƏNTİQİ ---
        function toggleRotate() {
            if (!videoContainer.classList.contains('landscape-mode')) {
                enterLandscape();
            } else {
                exitLandscape();
            }
        }
        function enterLandscape() {
            videoContainer.classList.add('landscape-mode');
            document.body.style.overflow = 'hidden';
            // WebView icazə verməsə belə, video konteynerini məcburi tam ekrana gətirir
            if (videoContainer.requestFullscreen) videoContainer.requestFullscreen().catch(() => {});
            showControlsTemporarily();
        }
        function exitLandscape() {
            videoContainer.classList.remove('landscape-mode');
            document.body.style.overflow = '';
            if (document.fullscreenElement) document.exitFullscreen();
            showControlsTemporarily();
        }
        // ------------------------------------

        async function togglePip() { /* ... kodun eynidir ... */ }
        video.addEventListener('leavepictureinpicture', () => { video.style.opacity = "1"; });
        function toggleTheme() { const body = document.body; const btn = document.getElementById('themeBtn'); if (body.getAttribute('data-theme') === 'dark') { body.removeAttribute('data-theme'); currentTheme = 'light'; btn.innerHTML = '<i class="fas fa-moon"></i> Gecə'; } else { body.setAttribute('data-theme', 'dark'); currentTheme = 'dark'; btn.innerHTML = '<i class="fas fa-sun"></i> Gündüz'; } }
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') requestWakeLock(); });
        window.onload = () => { fetchAndParseM3U(); requestWakeLock(); };
    </script>
</body>
</html>
