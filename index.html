<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OTT Mobile M3U Player</title>
    <!-- FontAwesome İkonları -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- HLS.js Kütüphanesi (IPTV için Kararlı ve Donmasız Versiyon) -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.10/dist/hls.min.js"></script>
    <style>
        /* Varsayılan Tema: BEYAZ (Gündüz Modu) */
        :root {
            --bg-color: #f5f5f7;
            --card-bg: #ffffff;
            --accent-color: #ff0055;
            --text-color: #1d1d1f;
            --text-dim: #6e6e73;
            --border-color: #e5e5ea;
        }

        /* Siyah Tema Değişkenleri (Gece Modu) */
        [data-theme="dark"] {
            --bg-color: #0f0f0f;
            --card-bg: #1f1f1f;
            --accent-color: #ff0055;
            --text-color: #ffffff;
            --text-dim: #aaaaaa;
            --border-color: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- ÜST CEO BAR --- */
        .ceo-header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 15px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent-color);
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* --- VİDEO ALANI --- */
        .video-container {
            width: 100%;
            position: relative;
            background: #000;
            aspect-ratio: 16 / 9;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .video-container.landscape-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            aspect-ratio: auto;
            z-index: 9999;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Medya Bilgi Başlığı (Kanal / Dizi İsmi Göstergesi) */
        .media-title-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 70px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            backdrop-filter: blur(5px);
            z-index: 1015;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-container.show-controls .media-title-overlay {
            opacity: 1;
        }

        /* Yatay Mod Geri Çıkış Oku */
        .landscape-back-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            z-index: 1010;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-container.landscape-mode .landscape-back-btn {
            display: flex;
        }
        
        .video-container.show-controls .landscape-back-btn {
            opacity: 1;
        }

        /* Video Kontrolleri */
        .video-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            display: flex;
            flex-direction: column;
            padding: 5px 15px 10px 15px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1005;
        }

        .video-container.show-controls .video-controls {
            opacity: 1;
        }

        /* Zaman Çizgisi */
        .timeline-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }

        .video-progress-bar {
            flex: 1;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
        }

        .video-progress-fill {
            height: 100%;
            width: 0%;
            background: var(--accent-color);
            border-radius: 3px;
        }

        .time-display {
            font-size: 12px;
            color: #fff;
            white-space: nowrap;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-btn {
            background: none;
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            padding: 5px 10px;
        }

        .center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            gap: 30px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 1010;
        }

        .video-container.show-controls .center-controls {
            opacity: 1;
            pointer-events: auto;
        }

        .center-btn {
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: white;
            font-size: 24px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- ANA İÇERİK ALANI --- */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 15px;
        }

        .top-bar-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .theme-toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dim);
            font-size: 16px;
        }

        .status-msg i {
            display: block;
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .main-tabs {
            display: flex;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 5px;
            flex: 1;
            margin-right: 10px;
            border: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-dim);
            padding: 10px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: white;
        }

        /* --- AKORDİYON KATEGORİ VE LİSTE --- */
        .category-accordion {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .accordion-item {
            background: var(--card-bg);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: 0.3s;
        }

        .accordion-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-weight: 600;
            font-size: 15px;
        }

        .accordion-header .count-badge {
            background: rgba(255, 0, 85, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            margin-left: 8px;
        }

        .accordion-header i {
            transition: transform 0.3s;
            color: var(--text-dim);
        }

        .accordion-item.active .accordion-header i {
            transform: rotate(180deg);
            color: var(--accent-color);
        }

        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            background: rgba(0, 0, 0, 0.01);
        }

        .accordion-item.active .accordion-content {
            max-height: 400px;
            overflow-y: auto;
            border-top: 1px solid var(--border-color);
        }

        .stream-list {
            display: flex;
            flex-direction: column;
        }

        .stream-list-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background 0.2s;
        }

        .stream-list-item:last-child {
            border-bottom: none;
        }

        .stream-list-item:active {
            background: rgba(255, 0, 85, 0.05);
        }

        .stream-logo {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.05);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            position: relative;
            border: 1px solid var(--border-color);
        }

        .stream-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 5px;
            position: absolute;
        }

        .stream-logo i {
            color: var(--text-dim);
            font-size: 16px;
        }

        .stream-details {
            flex: 1;
            min-width: 0;
        }

        .stream-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <!-- Üst Yönetici Künyesi -->
    <div class="ceo-header">
        <i class="fas fa-user-shield"></i> CEO: Əli Məhərrəmov
    </div>

    <!-- Oynatıcı Bölümü -->
    <div class="video-container" id="videoContainer">
        <!-- Medya Bilgi Başlığı (Kanal / Dizi ve Bölüm Göstergesi) -->
        <div class="media-title-overlay" id="mediaTitleOverlay">Oynatılan Yayın Seçilmedi</div>

        <!-- Yatay Mod Geri Dönüş Butonu -->
        <button class="landscape-back-btn" id="landscapeBackBtn" onclick="event.stopPropagation(); exitLandscape();" title="Geri Dön">
            <i class="fas fa-arrow-left"></i>
        </button>

        <video id="mainPlayer" playsinline></video>
        
        <!-- Orta Kontrol Butonları -->
        <div class="center-controls">
            <button class="center-btn" onclick="event.stopPropagation(); rewind();"><i class="fas fa-backward"></i></button>
            <button class="center-btn" id="centerPlayBtn" onclick="event.stopPropagation(); togglePlay();"><i class="fas fa-play"></i></button>
            <button class="center-btn" onclick="event.stopPropagation(); forward();"><i class="fas fa-forward"></i></button>
        </div>

        <!-- Alt Kontrol Barı -->
        <div class="video-controls" id="videoControls">
            <div class="timeline-container" onclick="event.stopPropagation();">
                <div class="video-progress-bar" id="progressBar" onclick="seekVideo(event)">
                    <div class="video-progress-fill" id="progressFill"></div>
                </div>
                <div class="time-display" id="timeDisplay">00:00 / 00:00</div>
            </div>

            <div class="control-row" onclick="event.stopPropagation();">
                <div class="control-group">
                    <button class="control-btn" onclick="togglePlay()" id="playBtn"><i class="fas fa-play"></i></button>
                    <button class="control-btn" onclick="rewind()"><i class="fas fa-undo"></i></button>
                    <button class="control-btn" onclick="forward()"><i class="fas fa-redo"></i></button>
                </div>
                <div class="control-group">
                    <button class="control-btn" onclick="toggleRotate()" id="rotateBtn" title="Ekranı Çevir"><i class="fas fa-sync-alt"></i> Çevir</button>
                    <button class="control-btn" onclick="togglePip()" id="pipBtn"><i class="fas fa-compress"></i> PiP</button>
                    <button class="control-btn" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
                </div>
            </div>
        </div>
    </div>

    <!-- İçerik Listesi Bölümü -->
    <div class="content-area">
        <div class="top-bar-tools">
            <div class="main-tabs">
                <button class="tab-btn active" id="tabLiveBtn" onclick="switchMainTab('live')">Canlı Kanallar</button>
                <button class="tab-btn" id="tabSeriesBtn" onclick="switchMainTab('series')">Diziler</button>
            </div>
            <button class="theme-toggle-btn" onclick="toggleTheme()" id="themeBtn">
                <i class="fas fa-moon"></i> Gece
            </button>
        </div>

        <div id="statusLayout" class="status-msg">
            <i class="fas fa-spinner fa-spin"></i>
            <span>M3U Oynatma Listesi Yükleniyor...</span>
        </div>

        <div id="mainLayout" style="display: none;">
            <div class="category-accordion" id="accordionContainer"></div>
        </div>
    </div>

    <script>
        const INTERNAL_M3U_URL = "https://raw.githubusercontent.com/zonaa3483-prog/eli-iptv-siyahi/refs/heads/main/alimtv.m3u"; 

        const PLAYLIST_DATA = {
            live: {},
            series: {}
        };

        let currentMainTab = 'live';
        let currentTheme = 'light'; // İlk açılış beyaz mod
        let hls = null;
        let controlsTimeout = null;
        let isChangingPip = false; // PiP mod geçiş koruması
        
        const video = document.getElementById('mainPlayer');
        const videoContainer = document.getElementById('videoContainer');
        const videoControls = document.getElementById('videoControls');
        const playBtn = document.getElementById('playBtn');
        const centerPlayBtn = document.getElementById('centerPlayBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const timeDisplay = document.getElementById('timeDisplay');
        const mediaTitleOverlay = document.getElementById('mediaTitleOverlay');

        // --- M3U PARSER (FİLTRELİ VE IPTV UYUMLU) ---
        async function fetchAndParseM3U() {
            try {
                const response = await fetch(INTERNAL_M3U_URL);
                if (!response.ok) throw new Error("Ağ hatası oluştu.");
                const text = await response.text();
                
                const lines = text.split('\n');
                let currentItemInfo = null;

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i].trim();
                    
                    if (line.startsWith('#EXTINF:')) {
                        const groupMatch = line.match(/group-title="([^"]+)"/);
                        const logoMatch = line.match(/tvg-logo="([^"]+)"/);
                        
                        const commaIndex = line.indexOf(',');
                        const title = commaIndex !== -1 ? line.substring(commaIndex + 1).trim() : "Bilinmeyen Kanal";
                        
                        const group = groupMatch ? groupMatch[1] : "Diğerleri";
                        const logo = logoMatch ? logoMatch[1] : "";

                        currentItemInfo = { title, logo, group };
                    } else if (line.startsWith('http') && currentItemInfo) {
                        const url = line;
                        
                        // Akış türünü tespit etme
                        let type = 'live';
                        if (url.includes('/series/') || url.endsWith('.mp4') || url.endsWith('.mkv') || url.includes('/vod/') || currentItemInfo.group.toLowerCase().includes('dizi') || currentItemInfo.group.toLowerCase().includes('series')) {
                            type = 'series';
                        }

                        // KRİTİK FİLTRE: Eğer akış Canlı Kanallardaysa ve adında Kurtlar Vadisi geçiyorsa LİSTEYE EKLEME
                        const isKurtlarVadisi = currentItemInfo.title.toLowerCase().includes('kurtlar vadisi') || currentItemInfo.group.toLowerCase().includes('kurtlar vadisi');
                        
                        if (type === 'live' && isKurtlarVadisi) {
                            currentItemInfo = null;
                            continue;
                        }

                        if (!PLAYLIST_DATA[type][currentItemInfo.group]) {
                            PLAYLIST_DATA[type][currentItemInfo.group] = [];
                        }

                        PLAYLIST_DATA[type][currentItemInfo.group].push({
                            title: currentItemInfo.title,
                            logo: currentItemInfo.logo,
                            url: url
                        });

                        currentItemInfo = null;
                    }
                }

                for (const t in PLAYLIST_DATA) {
                    for (const g in PLAYLIST_DATA[t]) {
                        if (PLAYLIST_DATA[t][g].length === 0) delete PLAYLIST_DATA[t][g];
                    }
                }

                initUI();

            } catch (error) {
                document.getElementById('statusLayout').innerHTML = `
                    <i class="fas fa-exclamation-triangle"></i>
                    <span>Oynatma listesi yüklenemedi!<br><small>${error.message}</small></span>
                `;
            }
        }

        function initUI() {
            if (Object.keys(PLAYLIST_DATA.live).length === 0 && Object.keys(PLAYLIST_DATA.series).length === 0) {
                document.getElementById('statusLayout').innerHTML = `<i class="fas fa-folder-open"></i><span>M3U içeriği boş veya ayrıştırılamadı.</span>`;
                return;
            }
            document.getElementById('statusLayout').style.display = 'none';
            document.getElementById('mainLayout').style.display = 'block';
            switchMainTab('live');
        }

        function switchMainTab(tab) {
            currentMainTab = tab;
            document.getElementById('tabLiveBtn').classList.toggle('active', tab === 'live');
            document.getElementById('tabSeriesBtn').classList.toggle('active', tab === 'series');
            renderAccordion();
        }

        function renderAccordion() {
            const container = document.getElementById('accordionContainer');
            container.innerHTML = '';
            
            const categories = Object.keys(PLAYLIST_DATA[currentMainTab]);

            if (categories.length === 0) {
                container.innerHTML = '<div class="status-msg">Bu kategoride içerik bulunamadı.</div>';
                return;
            }

            categories.forEach((catName) => {
                const items = PLAYLIST_DATA[currentMainTab][catName];
                
                const accordionItem = document.createElement('div');
                accordionItem.className = 'accordion-item';
                
                const header = document.createElement('div');
                header.className = 'accordion-header';
                header.innerHTML = `
                    <div>${catName} <span class="count-badge">${items.length}</span></div>
                    <i class="fas fa-chevron-down"></i>
                `;
                
                const content = document.createElement('div');
                content.className = 'accordion-content';
                
                const streamList = document.createElement('div');
                streamList.className = 'stream-list';
                
                items.forEach(item => {
                    const listItem = document.createElement('div');
                    listItem.className = 'stream-list-item';
                    listItem.onclick = () => playMedia(item.url, item.title);
                    
                    const imgHTML = item.logo ? `<img src="${item.logo}" onerror="this.style.display='none'">` : '';
                    const fallbackIcon = currentMainTab === 'live' ? 'fa-tv' : 'fa-film';
                    
                    listItem.innerHTML = `
                        <div class="stream-logo">
                            ${imgHTML}
                            <i class="fas ${fallbackIcon}"></i>
                        </div>
                        <div class="stream-details">
                            <div class="stream-name">${item.title}</div>
                        </div>
                    `;
                    streamList.appendChild(listItem);
                });
                
                content.appendChild(streamList);
                accordionItem.appendChild(header);
                accordionItem.appendChild(content);
                
                header.onclick = () => {
                    const isActive = accordionItem.classList.contains('active');
                    document.querySelectorAll('.accordion-item').forEach(item => item.classList.remove('active'));
                    if (!isActive) accordionItem.classList.add('active');
                };
                
                container.appendChild(accordionItem);
            });
        }

        // --- TELEVİZİO VE OTT-PLAY KALİTESİNDE ULTRA IPTV OYNATMA MOTORU ---
        function playMedia(url, title) {
            // OTT-PLAY SİSTEMİ ÖZELLİĞİ: Kanal geçişinde oynatıcıyı, kaynak belleğini ve DOM elementini tamamen sıfırla
            video.pause();
            video.removeAttribute('src'); 
            video.load();

            if (hls) {
                hls.destroy();
                hls = null;
            }

            mediaTitleOverlay.innerText = title || "Bilinmeyen Yayın";

            const isHlsStream = url.includes('.m3u8') || url.includes('.ts') || url.includes('mono.strm') || currentMainTab === 'live';
            
            if (isHlsStream && Hls.isSupported()) {
                // OTT-Play / Televizio standardında, ses kodek senkronizasyonlu kararlı Hls konfigürasyonu
                hls = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60,
                    liveSyncDurationCount: 3,
                    maxBufferHole: 0.5,
                    enableWorker: true,
                    lowLatencyMode: false,
                    autoStartLoad: true,
                    // OTT-Play Özelliği: Ses donmalarını ve kanal geçişlerindeki ses kaymalarını engelleme ayarları
                    enableSoftwareAES: true,
                    overrideAudioAAC: true, 
                    defaultAudioCodec: "mp4a.40.2", // Yaygın canlı yayın ses codec bileşeni zorlaması
                    xhrSetup: function (xhr, urlInfo) {
                        xhr.withCredentials = false;
                    }
                });

                hls.loadSource(url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    // OTT-PLAY SES ÇÖZÜMÜ: Ses engelini aşmak için önce sesi açık başlatmayı dene, hata verirse geçici sessize alıp hemen aç
                    video.muted = false;
                    const playPromise = video.play();
                    
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.log("Autoplay koruması tetiklendi, OTT-Play yöntemi ile ses aktifleştiriliyor...");
                            video.muted = true;
                            video.play().then(() => {
                                setTimeout(() => {
                                    video.muted = false; // Oynatım başladıktan hemen sonra sesi devreye sokar
                                }, 150);
                            });
                        });
                    }
                });
                
                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                // OTT-PLAY ÖZELLİĞİ: Canlı kanallarda ses/video uyumsuzluğu çökerse otomatik olarak kurtar ve yeniden senkronize et
                                hls.recoverMediaError();
                                break;
                            default:
                                video.src = url;
                                video.load();
                                video.muted = false;
                                video.play().catch(e => {
                                    video.muted = true;
                                    video.play();
                                });
                                break;
                        }
                    }
                });
            } else {
                video.src = url;
                video.load();
                video.muted = false;
                video.play().catch(e => {
                    video.muted = true;
                    video.play().then(() => { video.muted = false; });
                });
            }

            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
            centerPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
            showControlsTemporarily();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // --- SÜRE VE İLERLEME ÇUBUĞU (CANLI YAYIN KİLİTLENME KORUMALI) ---
        video.addEventListener('timeupdate', () => {
            if (video.duration && isFinite(video.duration) && video.duration > 0 && currentMainTab !== 'live') {
                const current = formatTime(video.currentTime);
                const total = formatTime(video.duration);
                timeDisplay.innerText = `${current} / ${total}`;
                const percentage = (video.currentTime / video.duration) * 100;
                progressFill.style.width = `${percentage}%`;
            } else {
                timeDisplay.innerText = "Canlı Yayın";
                progressFill.style.width = '100%';
            }
        });

        function formatTime(seconds) {
            if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function seekVideo(event) {
            if (!video.duration || !isFinite(video.duration)) return;
            const rect = progressBar.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const seekTime = (clickX / rect.width) * video.duration;
            video.currentTime = seekTime;
        }

        // --- KONTROLLER ---
        function togglePlay() {
            if (video.paused) {
                video.play().catch(e => console.log(e));
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                centerPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                video.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                centerPlayBtn.innerHTML = '<i class="fas fa-play"></i>';
            }
            showControlsTemporarily();
        }

        function forward() { video.currentTime += 10; showControlsTemporarily(); }
        function rewind() { video.currentTime -= 10; showControlsTemporarily(); }

        videoContainer.addEventListener('click', function(e) {
            if (e.target === video || e.target === videoContainer || e.target === mediaTitleOverlay) {
                if (videoContainer.classList.contains('show-controls')) {
                    videoContainer.classList.remove('show-controls');
                    if (controlsTimeout) clearTimeout(controlsTimeout);
                } else {
                    showControlsTemporarily();
                }
            }
        });

        function showControlsTemporarily() {
            videoContainer.classList.add('show-controls');
            if (controlsTimeout) clearTimeout(controlsTimeout);
            controlsTimeout = setTimeout(() => {
                if (!video.paused && !isChangingPip) videoContainer.classList.remove('show-controls');
            }, 3000);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (videoContainer.requestFullscreen) videoContainer.requestFullscreen();
                else if (videoContainer.webkitRequestFullscreen) videoContainer.webkitRequestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function toggleRotate() {
            if (!videoContainer.classList.contains('landscape-mode')) enterLandscape();
            else exitLandscape();
        }

        function enterLandscape() {
            videoContainer.classList.add('landscape-mode');
            document.body.style.overflow = 'hidden';
            if (videoContainer.requestFullscreen) {
                videoContainer.requestFullscreen().then(() => {
                    if (screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(e => console.log(e));
                });
            }
            showControlsTemporarily();
        }

        function exitLandscape() {
            videoContainer.classList.remove('landscape-mode');
            document.body.style.overflow = '';
            if (document.fullscreenElement) document.exitFullscreen();
            if (screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
            showControlsTemporarily();
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement && videoContainer.classList.contains('landscape-mode')) exitLandscape();
        });

        // --- KESİNTİSİZ PICTURE-IN-PICTURE (PiP) MOTORU ---
        async function togglePip() {
            try {
                isChangingPip = true;
                if (video !== document.pictureInPictureElement) {
                    await video.requestPictureInPicture();
                } else {
                    await document.exitPictureInPicture();
                }
            } catch (error) {
                alert("Cihazınız PiP özelliğini desteklemiyor.");
            } finally {
                isChangingPip = false;
                if (!video.paused) {
                    video.play().catch(e => console.log(e));
                }
            }
        }

        video.addEventListener('leavepictureinpicture', () => {
            setTimeout(() => {
                if (video.paused) {
                    video.play().catch(e => console.log(e));
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    centerPlayBtn.innerHTML = '<i class="fas fa-pause"></i>';
                }
            }, 100);
        });

        // --- AKILLI TEMA DEĞİŞTİRİCİ ---
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                currentTheme = 'light';
                btn.innerHTML = '<i class="fas fa-moon"></i> Gece';
            } else {
                body.setAttribute('data-theme', 'dark');
                currentTheme = 'dark';
                btn.innerHTML = '<i class="fas fa-sun"></i> Gündüz';
            }
        }

        window.onload = () => {
            fetchAndParseM3U();
        };
    </script>
</body>
</html>
